[tool.poetry]
name = "{{ cookiecutter.project_slug }}"
version = "0.1.0"
description = "Proyecto MLOps con Cookiecutter y Poetry"
authors = ["{{ cookiecutter.author }}"]

[tool.poetry.dependencies]
python = "^3.10"
numpy = "^1.26"
pandas = "^2.2"
scikit-learn = "^1.5"
mlflow = {optional = true, version = "^2.4"}
dvc = {optional = true, version = "^3.51"}


[tool.poetry.group.authoring.dependencies]
pytest = "^8.3"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"