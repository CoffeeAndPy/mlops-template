# CD
#
# It runs when there is a push to main (that is, when a PR is merged).
# Just triggers if relevant files change (not docs, not minor configs).
#
# Jobs:
#   1. train    → trains the model and saves artifacts
#   2. publish  → builds and publishes the image to GitHub Container Registry
#   3. deploy   → deploys to production (requires manual approval)

name: CD

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "api/**"
      - "requirements.txt"
      - "Dockerfile"
      - "params.yaml"
      # Only triggers if relevant code changes.
      # A change in README.md shouldn't trigger a retraining.

jobs:

  #  Job 1: Train 
  train:
    name: Train Model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "{{cookiecutter.python_version}}"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start MLflow in background
        run: |
          mlflow server \
            --host 127.0.0.1 \
            --port {{cookiecutter.mlflow_port}} \
            --backend-store-uri ./mlruns \
            --default-artifact-root ./mlartifacts &
          sleep 5
        # We start MLflow locally for training.
        # In a real environment, this would point to a shared remote server.

      - name: Train model
        run: python src/train.py
        # TODO: adjust the training command according to your project.
        # You can pass hyperparameters from params.yaml or Actions variables:
        #   python src/train.py --learning_rate ${{ vars.LEARNING_RATE }}
        env:
          MLFLOW_TRACKING_URI: http://127.0.0.1:{{cookiecutter.mlflow_port}}

      - name: Save model as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ github.sha }}
          path: model/
          retention-days: 30
          # The trained model is saved as an artifact of this workflow run.
          # The publish job will download it to include in the Docker image.

  #  Job 2: Publish
    publish:
      name: Build & Publish Image
      runs-on: ubuntu-latest
      needs: train
      permissions:
        contents: read
        packages: write
        # Packages: write → needed to push to ghcr.io

      steps:
        - uses: actions/checkout@v4

        - name: Download trained model
          uses: actions/download-artifact@v4
          with:
            name: model-${{ github.sha }}
            path: model/

        - name: Log in to GitHub Container Registry
          uses: docker/login-action@v2
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
            # GITHUB_TOKEN is automatically provided by GitHub Actions, no need to set it up.
            # it has permissions to write in ghcr.io for the current repository.

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Build and push image
          uses: docker/build-push-action@v5
          with:
            context: .
            file: ./Dockerfile
            push: true
            tags: |
              ghcr.io/${{ github.repository }}:latest
              ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
            # Two tags for every build
            #   :latest → always points to the latest successful build on main
            #   :sha-<commit> → inmutable tag for that specific commit, useful for rollbacks and traceability
            #
            # In production, you might want to deploy with sha for better traceability and rollback capabilities.
            # If something goes wrong, you want to know what image is running.
            cache-from: type=gha
            cache-to: type=gha,mode=max

  #  Job 3: Deploy
    deploy:
      name: Deploy
      runs-on: ubuntu-latest
      needs: publish
      environment: production
      # environment: production → this job will require manual approval in GitHub.
      # Configure in Settings → Environments → production → Required reviewers.
      # This adds a human barrier before something goes to production.

      steps:
        - uses: actions/checkout@v4

        - name: Deploy
          run: |
            echo "Deploying image: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"
            # TODO: change this command to your actual deployment script.
            #
            # Commons deployment options:
            #
            # A) Docker Compose on remote server with SSH:
            #    ssh user@server "docker compose pull && \
            #                     docker compose up -d"
            #
            # B) Kubernetes:
            #    kubectl set image deployment/api api=ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
            #
            # C) Local:
            #   docker compose pull            
            #   docker compose up -d --no-build

        - name: Post-deployment test
          run: |
            echo "Running post-deployment tests..."
            # Example:
            #   curl -f http://your-server/health
            #   kubectl rollout status deployment/api